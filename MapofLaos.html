<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #flag{
            height: 600px;
            width: 900px;
            background-color: #CE1126;
            position: relative;
            font-size: 5em;
        }
        #flag > div{
            height: 50%;
            width: 100%;
            background-color: #002868;
            position: absolute;
            top: 25%;
        }

        #flag div div{
            height: 200px;
            width: 200px; 
            background-color: white;
            position: absolute ;
            left: 350px;
            top:50px; 
            border-radius: 50%;
        }

        #flag > span{
            display: block;
            color: white; 
            text-align: center;  
        }

        #flag > div div span{
            display: block;
            color: black; 
            text-align: center;  

        }
    </style>
</head>
<body>
    <div id="flag">
        <span>The Flag</span>
        <div>
            <div>
                <span>of Laos</span>
            </div>
        </div>
    </div>
    
</body>
</html>
